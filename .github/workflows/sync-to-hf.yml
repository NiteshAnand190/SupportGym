name: Sync to Hugging Face

on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://NiteshAnand190:$HF_TOKEN@huggingface.co/spaces/NiteshAnand/supportgym || true
          git push hf main --force
