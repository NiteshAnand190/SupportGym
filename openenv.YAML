name: supportgym
version: "1.0.0"
description: >
  SupportGym is an OpenEnv-compatible reinforcement learning environment
  for training AI agents on real-world customer support tasks.
  Agents must handle tickets ranging from simple FAQ resolution
  to complex multi-policy escalation scenarios.

tags:
  - openenv
  - customer-support
  - nlp
  - text
  - real-world

endpoints:
  reset: POST /reset
  step:  POST /step
  state: GET  /state

observation:
  type: object
  properties:
    task_id:
      type: string
      description: Active task identifier
    ticket_text:
      type: string
      description: The customer's support ticket
    customer_history:
      type: array
      items: { type: string }
      description: Customer account context
    context:
      type: object
      description: Policies, order details, knowledge base
    step_count:
      type: integer
      description: Current step within the episode
    max_steps:
      type: integer
      description: Maximum steps before forced termination
    previous_replies:
      type: array
      items: { type: string }
      description: Agent replies so far this episode
    done:
      type: boolean
      description: Whether the episode has ended

action:
  type: object
  required: [reply, decision]
  properties:
    reply:
      type: string
      description: The agent's text response to the customer
    decision:
      type: string
      enum: [resolve, refund, escalate, request_info]
      description: The agent's classification of the appropriate outcome
    reason:
      type: string
      description: Optional reasoning for the decision

reward:
  type: number
  minimum: 0.0
  maximum: 1.0
  description: >
    Composite score from sub-graders. Never binary — always provides
    partial signal. Breakdown available in step() info field.

tasks:
  - id: easy
    difficulty: easy
    description: "Simple FAQ resolution — customer forgot password"
    max_steps: 3
    scoring_components: [decision, tone, accuracy]

  - id: medium
    difficulty: medium
    description: "Refund handling — wrong item delivered within 30-day policy window"
    max_steps: 5
    scoring_components: [policy, tone, action]

  - id: hard
    difficulty: hard
    description: "Complex escalation — out-of-window defect claim + chargeback threat"
    max_steps: 8
    scoring_components: [escalation, tone, no_promises, awareness]

runtime:
  estimated_minutes_per_task: 2
  max_total_minutes: 20
  min_memory_gb: 1
  min_cpu: 1
